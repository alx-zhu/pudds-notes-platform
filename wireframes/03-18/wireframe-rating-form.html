<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rating Form — Wireframe</title>
  <style>
    /* ─── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F7F7F5;
      --surface:    #FFFFFF;
      --border:     #E4E4E0;
      --text-main:  #1A1A18;
      --text-muted: #6E6E6A;
      --accent:     #2563EB;
      --accent-bg:  #EFF6FF;
      --danger:     #DC2626;
      --success:    #16A34A;
      --star-on:    #F59E0B;
      --star-off:   #D1D5DB;
      --radius:     10px;
      --sidebar-w:  240px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
      font-size: 14px;
    }

    /* ─── Layout ────────────────────────────────────────────────── */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ─── Sidebar ───────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      z-index: 10;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Progress bar */
    .progress-wrap { display: flex; flex-direction: column; gap: 8px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text-muted);
    }
    .progress-bar {
      height: 6px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 99px;
      width: 0%;
      transition: width .35s ease;
    }

    /* Nav items */
    .nav-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .nav-item a {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 7px;
      text-decoration: none; color: var(--text-muted);
      font-size: 13px; font-weight: 500;
      transition: background .15s, color .15s;
    }
    .nav-item a:hover { background: var(--bg); color: var(--text-main); }
    .nav-item.answered a { color: var(--text-main); }
    .nav-item.active a { background: var(--accent-bg); color: var(--accent); }
    .nav-dot {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      flex-shrink: 0; transition: all .15s;
    }
    .nav-item.answered .nav-dot { border-color: var(--success); background: var(--success); color: #fff; }
    .nav-item.active .nav-dot { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* Sidebar footer */
    .sidebar-footer { margin-top: auto; }
    .btn-submit {
      width: 100%; padding: 10px; border-radius: var(--radius);
      background: var(--accent); color: #fff;
      border: none; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-submit:hover { opacity: .88; }
    .submit-hint { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 8px; }

    /* ─── Main Content ───────────────────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 48px 40px 80px;
      max-width: 860px;
    }

    .form-header { margin-bottom: 36px; }
    .form-header h1 { font-size: 22px; font-weight: 700; }
    .form-header p { color: var(--text-muted); margin-top: 6px; font-size: 14px; max-width: 560px; }

    /* ─── Question Card ──────────────────────────────────────────── */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 20px;
      scroll-margin-top: 28px;
      transition: border-color .2s, box-shadow .2s;
    }
    .question-card:focus-within { border-color: #C7D7F9; box-shadow: 0 0 0 3px #DBEAFE; }
    .question-card.is-answered { border-left: 3px solid var(--success); }

    /* Card header row */
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .card-left { flex: 1; }
    .q-number {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
    }
    .q-title { font-size: 16px; font-weight: 600; color: var(--text-main); }
    .q-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

    /* Answer badge */
    .answer-badge {
      flex-shrink: 0;
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: 99px; background: #F0FDF4; color: var(--success);
      border: 1px solid #BBF7D0; display: none;
    }
    .is-answered .answer-badge { display: inline-flex; align-items: center; gap: 4px; }

    /* Description toggle */
    .desc-toggle {
      margin-top: 10px;
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--accent); cursor: pointer;
      background: none; border: none; padding: 0; font-family: inherit;
    }
    .desc-toggle:hover { text-decoration: underline; }
    .desc-toggle svg { transition: transform .2s; }
    .desc-toggle.open svg { transform: rotate(180deg); }

    /* Description panel */
    .desc-panel {
      max-height: 0; overflow: hidden; transition: max-height .3s ease;
    }
    .desc-panel.open { max-height: 300px; }
    .desc-inner {
      margin-top: 14px;
      padding: 14px 16px;
      background: #F8FAFC;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.65;
    }
    .desc-inner strong { color: var(--text-main); font-weight: 600; }
    .option-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-top: 10px;
    }
    .option-desc {
      display: flex; gap: 8px;
      padding: 8px 10px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px;
    }
    .opt-score { font-weight: 700; color: var(--accent); min-width: 16px; }
    .opt-label { font-size: 12px; color: var(--text-muted); }

    /* Divider */
    .card-divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* ─── Rating Scale ───────────────────────────────────────────── */
    .rating-section {}
    .rating-label {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      letter-spacing: .04em; text-transform: uppercase; margin-bottom: 12px;
    }

    .rating-scale {
      display: flex; gap: 8px; align-items: stretch;
    }
    .rating-option { flex: 1; }
    .rating-option input[type="radio"] { display: none; }
    .rating-option label {
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 6px; border: 1.5px solid var(--border);
      border-radius: 8px; cursor: pointer;
      transition: all .15s; text-align: center;
      background: var(--surface);
    }
    .rating-option label:hover { border-color: var(--accent); background: var(--accent-bg); }
    .rating-option input:checked + label {
      border-color: var(--accent); background: var(--accent-bg);
      box-shadow: 0 0 0 2px rgba(37,99,235,.15);
    }
    .rating-score {
      font-size: 18px; font-weight: 700; color: var(--text-main);
      line-height: 1; margin-bottom: 4px;
    }
    .rating-option input:checked + label .rating-score { color: var(--accent); }
    .rating-text {
      font-size: 11px; color: var(--text-muted); font-weight: 500; line-height: 1.3;
    }
    .rating-option input:checked + label .rating-text { color: var(--accent); }

    /* Scale labels beneath */
    .scale-ends {
      display: flex; justify-content: space-between;
      margin-top: 7px; font-size: 11px; color: var(--text-muted);
    }

    /* ─── Comments ───────────────────────────────────────────────── */
    .comment-section { margin-top: 18px; }
    .comment-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-muted); cursor: pointer;
      background: none; border: none; padding: 0; font-family: inherit;
    }
    .comment-toggle:hover { color: var(--text-main); }
    .comment-toggle svg { transition: transform .2s; }
    .comment-toggle.open svg { transform: rotate(180deg); }

    .comment-panel { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
    .comment-panel.open { max-height: 200px; }
    .comment-inner { margin-top: 10px; }
    .comment-inner textarea {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 13px; color: var(--text-main);
      resize: vertical; min-height: 72px;
      transition: border-color .15s;
      background: var(--surface);
    }
    .comment-inner textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .comment-inner textarea::placeholder { color: var(--text-muted); }

    /* ─── Tooltip hint ───────────────────────────────────────────── */
    .required-mark { color: var(--danger); margin-left: 2px; }

    /* ─── Answered checkmark ─────────────────────────────────────── */
    .check-icon { width: 12px; height: 12px; }

    /* ─── Scroll-spy active state (JS driven) ────────────────────── */
    .nav-item.active .nav-dot { font-size: 0; }
    .nav-item.active .nav-dot::after { content: "→"; font-size: 10px; }

    /* ─── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 720px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 24px 16px 60px; }
      .rating-text { display: none; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- ─── Sidebar ───────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div>
      <div class="sidebar-title">Evaluation Form</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progress</span>
        <span id="progress-text">0 / 9</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <ul class="nav-list" id="nav-list">
      <!-- Generated by JS -->
    </ul>

    <div class="sidebar-footer">
      <button class="btn-submit">Submit Evaluation</button>
      <p class="submit-hint">All 9 questions required</p>
    </div>
  </aside>

  <!-- ─── Main ──────────────────────────────────────────────────── -->
  <main class="main">
    <div class="form-header">
      <h1>Product Experience Evaluation</h1>
      <p>Rate each category from 1 (Poor) to 5 (Excellent). Expand any question for a detailed description of each rating level, and add notes where helpful.</p>
    </div>

    <form id="rating-form">
      <!-- Cards generated by JS -->
    </form>
  </main>

</div>

<script>
  /* ─── Question Data ─────────────────────────────────────────────── */
  const questions = [
    {
      title: "Overall Satisfaction",
      subtitle: "General feeling about the product as a whole",
      description: "Consider the full arc of your experience — from first impression through daily use. Think about whether the product consistently met your expectations and delivered on its core promise.",
      options: [
        { score: 1, label: "Very dissatisfied — did not meet expectations" },
        { score: 2, label: "Below average — significant gaps remain" },
        { score: 3, label: "Acceptable — meets basic needs with caveats" },
        { score: 4, label: "Satisfied — solid experience with minor issues" },
        { score: 5, label: "Delighted — exceeded all expectations" },
      ]
    },
    {
      title: "Ease of Use",
      subtitle: "Learnability and day-to-day usability",
      description: "Rate how intuitive the product is for new users, and how efficiently experienced users can accomplish tasks. Consider onboarding, discoverability of features, and the effort required for common workflows.",
      options: [
        { score: 1, label: "Confusing — requires extensive external help" },
        { score: 2, label: "Difficult — frequent friction in core tasks" },
        { score: 3, label: "Moderate — manageable with some learning" },
        { score: 4, label: "Intuitive — most tasks feel natural" },
        { score: 5, label: "Effortless — zero-friction experience" },
      ]
    },
    {
      title: "Performance & Reliability",
      subtitle: "Speed, stability, and consistency",
      description: "Evaluate responsiveness, loading times, crash frequency, and whether the product behaves predictably under normal and peak usage conditions.",
      options: [
        { score: 1, label: "Unreliable — frequent crashes or failures" },
        { score: 2, label: "Inconsistent — occasional but disruptive issues" },
        { score: 3, label: "Adequate — minor slowdowns or hiccups" },
        { score: 4, label: "Reliable — rarely any disruption" },
        { score: 5, label: "Rock solid — blazing speed, zero issues" },
      ]
    },
    {
      title: "Design & Aesthetics",
      subtitle: "Visual quality and overall polish",
      description: "Consider visual hierarchy, typography, color usage, spacing, and whether the design communicates information clearly. Also consider whether the aesthetic aligns with the product's purpose.",
      options: [
        { score: 1, label: "Unappealing — cluttered or inconsistent" },
        { score: 2, label: "Below average — dated or unclear hierarchy" },
        { score: 3, label: "Acceptable — functional but unremarkable" },
        { score: 4, label: "Well-designed — clean and purposeful" },
        { score: 5, label: "Exceptional — beautiful and highly polished" },
      ]
    },
    {
      title: "Feature Completeness",
      subtitle: "Does it do everything you need it to?",
      description: "Rate how well the product's feature set covers your actual workflow needs. Consider both the breadth of features and the depth of each feature's implementation.",
      options: [
        { score: 1, label: "Missing critical features for core use" },
        { score: 2, label: "Significant gaps in functionality" },
        { score: 3, label: "Covers essentials, some gaps remain" },
        { score: 4, label: "Feature-rich, minor omissions only" },
        { score: 5, label: "Comprehensive — nothing feels missing" },
      ]
    },
    {
      title: "Support & Documentation",
      subtitle: "Help resources and customer support quality",
      description: "Consider the quality of in-product help, knowledge base articles, tutorials, and direct customer support responsiveness and effectiveness.",
      options: [
        { score: 1, label: "No meaningful support or docs available" },
        { score: 2, label: "Limited — hard to find help when stuck" },
        { score: 3, label: "Adequate — answers most common questions" },
        { score: 4, label: "Helpful — quick and thorough responses" },
        { score: 5, label: "Outstanding — proactive, expert-level support" },
      ]
    },
    {
      title: "Value for Money",
      subtitle: "Return on investment relative to cost",
      description: "Evaluate whether the price paid is justified by the value delivered. Consider both tangible outcomes (time saved, revenue generated) and intangible benefits (reduced stress, team confidence).",
      options: [
        { score: 1, label: "Not worth the cost — poor ROI" },
        { score: 2, label: "Below average — cost outweighs benefit" },
        { score: 3, label: "Fair — roughly appropriate pricing" },
        { score: 4, label: "Good value — clearly worth the price" },
        { score: 5, label: "Exceptional value — far exceeds cost" },
      ]
    },
    {
      title: "Integration & Compatibility",
      subtitle: "How well it fits into your existing workflow",
      description: "Rate how easily the product integrates with your other tools, platforms, and workflows. Consider API availability, native integrations, data import/export, and how much custom glue-work was required.",
      options: [
        { score: 1, label: "Isolated — no meaningful integrations" },
        { score: 2, label: "Limited — few integrations, manual work needed" },
        { score: 3, label: "Moderate — core integrations work reasonably" },
        { score: 4, label: "Well-integrated — fits naturally into stack" },
        { score: 5, label: "Seamless — felt like it was made for our workflow" },
      ]
    },
    {
      title: "Likelihood to Recommend",
      subtitle: "Would you recommend this to a colleague?",
      description: "This is your overall net promoter signal. Consider everything — value, quality, support, reliability — and how confident you'd be putting your reputation behind a recommendation to a peer.",
      options: [
        { score: 1, label: "Would actively warn others away" },
        { score: 2, label: "Would not recommend it" },
        { score: 3, label: "Neutral — depends on their specific needs" },
        { score: 4, label: "Would recommend with minor caveats" },
        { score: 5, label: "Would enthusiastically recommend" },
      ]
    },
  ];

  /* ─── State ─────────────────────────────────────────────────────── */
  const answers = new Array(questions.length).fill(null);
  const ratingLabels = ["Poor", "Fair", "Good", "Very Good", "Excellent"];

  /* ─── Build Nav ─────────────────────────────────────────────────── */
  const navList = document.getElementById("nav-list");
  questions.forEach((q, i) => {
    const li = document.createElement("li");
    li.className = "nav-item";
    li.id = `nav-${i}`;
    li.innerHTML = `<a href="#q-${i}">
      <span class="nav-dot">${i + 1}</span>
      <span>${q.title}</span>
    </a>`;
    navList.appendChild(li);
  });

  /* ─── Build Cards ───────────────────────────────────────────────── */
  const form = document.getElementById("rating-form");
  questions.forEach((q, i) => {
    const optionDescs = q.options.map(o =>
      `<div class="option-desc">
        <span class="opt-score">${o.score}</span>
        <span class="opt-label">${o.label}</span>
      </div>`
    ).join("");

    const ratingButtons = q.options.map(o => {
      const uid = `q${i}_r${o.score}`;
      return `
        <div class="rating-option">
          <input type="radio" name="q${i}" id="${uid}" value="${o.score}" />
          <label for="${uid}">
            <span class="rating-score">${o.score}</span>
            <span class="rating-text">${ratingLabels[o.score - 1]}</span>
          </label>
        </div>`;
    }).join("");

    const card = document.createElement("div");
    card.className = "question-card";
    card.id = `q-${i}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-left">
          <div class="q-number">Question ${i + 1} of ${questions.length}<span class="required-mark">*</span></div>
          <div class="q-title">${q.title}</div>
          <div class="q-subtitle">${q.subtitle}</div>
          <button type="button" class="desc-toggle" data-idx="${i}">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            View rating descriptions
          </button>
          <div class="desc-panel" id="desc-${i}">
            <div class="desc-inner">
              <p>${q.description}</p>
              <div class="option-grid">${optionDescs}</div>
            </div>
          </div>
        </div>
        <span class="answer-badge">
          <svg class="check-icon" viewBox="0 0 12 12" fill="none">
            <path d="M2 6.5L4.5 9L10 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Answered
        </span>
      </div>

      <div class="card-divider"></div>

      <div class="rating-section">
        <div class="rating-label">Your rating</div>
        <div class="rating-scale">${ratingButtons}</div>
        <div class="scale-ends">
          <span>1 — Poor</span>
          <span>5 — Excellent</span>
        </div>
      </div>

      <div class="comment-section">
        <button type="button" class="comment-toggle" data-idx="${i}">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Add a note or comment
        </button>
        <div class="comment-panel" id="comment-${i}">
          <div class="comment-inner">
            <textarea placeholder="Optional — share any context, specific examples, or suggestions about this category…" rows="3"></textarea>
          </div>
        </div>
      </div>
    `;
    form.appendChild(card);
  });

  /* ─── Interaction: Description toggles ────────────────────────── */
  document.querySelectorAll(".desc-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = btn.dataset.idx;
      const panel = document.getElementById(`desc-${i}`);
      const open = panel.classList.toggle("open");
      btn.classList.toggle("open", open);
      btn.childNodes[2].textContent = open ? " Hide rating descriptions" : " View rating descriptions";
    });
  });

  /* ─── Interaction: Comment toggles ────────────────────────────── */
  document.querySelectorAll(".comment-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = btn.dataset.idx;
      const panel = document.getElementById(`comment-${i}`);
      const open = panel.classList.toggle("open");
      btn.classList.toggle("open", open);
      btn.childNodes[2].textContent = open ? " Hide note" : " Add a note or comment";
      if (open) panel.querySelector("textarea").focus();
    });
  });

  /* ─── Interaction: Rating selection ───────────────────────────── */
  function updateProgress() {
    const answered = answers.filter(a => a !== null).length;
    document.getElementById("progress-text").textContent = `${answered} / 9`;
    document.getElementById("progress-fill").style.width = `${(answered / 9) * 100}%`;

    questions.forEach((_, i) => {
      const navItem = document.getElementById(`nav-${i}`);
      const dot = navItem.querySelector(".nav-dot");
      if (answers[i] !== null) {
        navItem.classList.add("answered");
        dot.textContent = "✓";
      } else {
        navItem.classList.remove("answered");
        dot.textContent = i + 1;
      }
    });
  }

  document.querySelectorAll("input[type='radio']").forEach(radio => {
    radio.addEventListener("change", () => {
      const name = radio.name; // "q0", "q1", ...
      const i = parseInt(name.replace("q", ""));
      answers[i] = parseInt(radio.value);
      const card = document.getElementById(`q-${i}`);
      card.classList.add("is-answered");
      updateProgress();
    });
  });

  /* ─── Scroll Spy ───────────────────────────────────────────────── */
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id; // "q-0", etc.
        const i = parseInt(id.replace("q-", ""));
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
        document.getElementById(`nav-${i}`)?.classList.add("active");
      }
    });
  }, { threshold: 0.35 });

  document.querySelectorAll(".question-card").forEach(card => observer.observe(card));

  /* ─── Submit ───────────────────────────────────────────────────── */
  document.querySelector(".btn-submit").addEventListener("click", () => {
    const unanswered = answers.filter(a => a === null).length;
    if (unanswered > 0) {
      alert(`Please answer all ${unanswered} remaining question(s) before submitting.`);
    } else {
      alert("Form submitted! (Wireframe demo — no real submission.)");
    }
  });
</script>
</body>
</html>
